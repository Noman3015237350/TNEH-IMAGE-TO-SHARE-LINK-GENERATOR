<!DOCTYPE html>
<html>
<head>
    <title>Image Share Link Generator</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        #dropZone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        #dropZone:hover {
            border-color: #667eea;
            background: #f5f3ff;
        }
        #dropZone.drag-over {
            border-color: #667eea;
            background: #ede9fe;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        #preview {
            margin: 20px 0;
            text-align: center;
        }
        #preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            display: none;
        }
        .result a {
            color: #16a34a;
            word-break: break-all;
            text-decoration: none;
        }
        .result a:hover {
            text-decoration: underline;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
        }
        .error {
            background: #fee2e2;
            border-color: #fecaca;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Image Share Link Generator</h1>
        <div class="subtitle">Upload an image and get a shareable link</div>
        
        <div id="dropZone">
            <div class="upload-icon">📷</div>
            <p>Drag & drop an image here or click to upload</p>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>
        
        <div id="preview"></div>
        <div class="loading" id="loading">⏳ Uploading... Please wait</div>
        <div id="result" class="result"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const result = document.getElementById('result');
        const loading = document.getElementById('loading');

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                alert('Please select a valid image file');
                return;
            }

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            };
            reader.readAsDataURL(file);

            // Upload
            loading.style.display = 'block';
            result.style.display = 'none';
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    result.style.display = 'block';
                    result.className = 'result';
                    result.innerHTML = `
                        <strong>✅ Shareable Link Created!</strong><br><br>
                        <a href="${data.url}" target="_blank">${data.url}</a><br><br>
                        <button onclick="copyToClipboard('${data.url}')">📋 Copy Link</button>
                        <button onclick="downloadQR('${data.url}')">📱 Generate QR Code</button>
                    `;
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                result.style.display = 'block';
                result.className = 'result error';
                result.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('Link copied to clipboard!');
        }

        function downloadQR(url) {
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
            window.open(qrUrl, '_blank');
        }
    </script>
</body>
</html>
